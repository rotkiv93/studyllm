name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # Intel
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04' # older glibc for broader AppImage/deb compat
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Code signing is opt-in via repo secrets — see README "Release signing" section
      # for what to generate and where to paste it. Any secret left unset here makes
      # tauri-action/tauri-bundler skip signing for that platform and fall back to an
      # unsigned build, so this workflow keeps working with none, some, or all of them
      # configured. Windows: WINDOWS_CERTIFICATE (base64 .pfx) + WINDOWS_CERTIFICATE_PASSWORD.
      # macOS: APPLE_CERTIFICATE (base64 .p12) + APPLE_CERTIFICATE_PASSWORD for codesigning,
      # plus APPLE_ID/APPLE_PASSWORD (app-specific password)/APPLE_TEAM_ID for notarization —
      # all five are required together to notarize; codesigning alone works with just the
      # certificate pair. Once an auto-updater is wired up, TAURI_SIGNING_PRIVATE_KEY /
      # TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets will also need to be added here.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'StudyLLM ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install this version for your OS.

            If this build isn't code-signed yet, Windows SmartScreen and macOS
            Gatekeeper will warn before you can run it. See the README for how to
            proceed either way.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
